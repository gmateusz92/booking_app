{% extends 'base.html' %}

{% block content %}



<h1 class="display-5 fw-bold text-center">Reserve {{ apartment.name|capfirst }}</h1>

<div class="mt-5 d-flex flex-column align-items-center justify-content-center ">
    <form method="post" action="{% url 'reservations:BookingView' pk=apartment.pk %}" class="d-flex flex-column align-items-center justify-content-center">
        {% csrf_token %}
        {% if form.errors.check_in %}
            <div class="alert alert-danger" role="alert">
                {{ form.errors.check_in }}
            </div>
        {% endif %}
        {{ form }}
        <input type="submit" class="btn btn-success mt-3" value="Reserve">
    </form>
<br>
<br>

    <div class="mt-3 d-flex flex-row align-items-center justify-content-center">
        <a href="{{ prev_month_url }}" class="btn btn-primary">Poprzedni miesiąc</a>
        <a href="{{ next_month_url }}" class="btn btn-primary ml-2">Następny miesiąc</a>
    </div>

    {{ calendar }}
</div>




{% endblock %}

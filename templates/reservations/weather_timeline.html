<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Weather Timeline</title>
</head>
<body>
    <h1>Weather Timeline</h1>
    <div id="weather-data">
        <!-- Tutaj zostanie umieszczona pobrana informacja o pogodzie -->
    </div>

    <script>
        // Pobieranie danych o pogodzie po załadowaniu strony
        window.onload = function() {
            fetch('/weather-timeline/')
            .then(response => response.json())
            .then(data => {
                // Tutaj możesz manipulować danymi o pogodzie i wyświetlać je na stronie
                console.log(data);
                document.getElementById('weather-data').innerText = JSON.stringify(data, null, 2);
            })
            .catch(error => console.error('Error fetching weather data:', error));
        };
    </script>
</body>
</html>

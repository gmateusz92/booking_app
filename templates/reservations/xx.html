<div class="col-md-10">
  <div class="h-100 p-5 bg-body-tertiary">
      <div class="card mt-5 text-center">
          <div class="card-body">
              <h5 class="card-title">Month</h5>

              <div class="mx-auto col-md-15">
                  {{ calendar }}
              </div>

              <div class="mt-3">
                  <a href="{{ prev_month_url }}" class="btn btn-primary">Poprzedni miesiąc</a>
                  <a href="{{ next_month_url }}" class="btn btn-primary">Następny miesiąc</a>
              </div>
              
              <!-- Dodaj formularz rezerwacji z polem daty -->
              
              <form method="post" action="{% url 'reservations:BookingView' pk=apartment.pk %}" class="mt-3">
                  {% csrf_token %}
                  {% if form.errors.check_in %}
                      <div class="alert alert-danger" role="alert">
                          {{ form.errors.check_in }}
                      </div>
                  {% endif %}
                  {{ form }}
                  <input type="submit" class="btn btn-success mt-3" value="Reserve">
              </form>
          </div>
      </div>
  </div>
</div>

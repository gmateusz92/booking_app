{% extends 'base.html' %}

{% block content %}

<!-- Main Section Start -->
<div class="main-section">
    <div class="page-section nopadding cs-nomargin" style="margin-top: 0px; padding-top: 120px; padding-bottom: 60px; margin-bottom: 0px;">
        <div class="container">
            <div class="row justify-content-center">
                <div class="col-lg-6 col-md-8 col-sm-10 col-xs-12 center-form x-input">
                    <div class="user-dashboard loader-holder">
                        <div class="user-holder">
                            <h4 class="text-center mb-0">SIGN IN</h4>
                            <p class="text-center">Order food from your favourite restaurants</p>
                            <hr>
                            <div id="restaurant-sets-holder">
                                <!-- enctype="multipart/form-data"> zeby dodac pliki multimedialne w form -->
                                <form action="{% url 'accounts:login' %}" class="" method="post" enctype="multipart/form-data">
                                    {% csrf_token %}
                                    <div class="row mb-3">
                                        <div class="col-12">
                                            <div class="form-group mb-3">
                                                <label for="email">Email Address</label>
                                                <input type="email" class="form-control" name="email" placeholder="Enter your email address">
                                            </div>
                                        </div>
                                        <div class="col-12">
                                            <div class="form-group">
                                                <label for="password">Password</label>
                                                <input type="password" class="form-control" name="password" placeholder="Enter your password">
                                            </div>
                                        </div>
                                    </div>
                                    <div class="row">
                                        <div class="col-12">
                                            <div class="field-holder">
                                                <div class="payment-holder">
                                                    <input type="submit" value="Login" id="btn-next-restaurant-information" class="btn btn-primary">
                                                    <a href="#" class="float-right">Forgot password</a>
                                                </div>
                                            </div>
                                        </div>
                                    </div>
                                    <div class="row mt-3">
                                        <div class="col-12">
                                            <!-- load message -->
                                            {% include 'includes/alerts.html' %}
                                        </div>
                                    </div>
                                </form>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
<!-- Main Section End -->

{% endblock %}
